services:
  learnai:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: learnai
    restart: unless-stopped
    env_file: .env
    networks:
      - traefik-public
    volumes:
      - learnai-data:/data
    labels:
      - traefik.enable=true
      - traefik.http.routers.learnai.rule=Host(`learnai.almari`)
      - traefik.http.routers.learnai.entrypoints=websecure
      - traefik.http.routers.learnai.tls=true
      - traefik.http.services.learnai.loadbalancer.server.port=3000
      - traefik.http.services.learnai.loadbalancer.responseforwarding.flushinterval=-1

networks:
  traefik-public:
    external: true

volumes:
  learnai-data:
