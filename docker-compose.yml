services:
  learn:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: learn
    restart: unless-stopped
    env_file: .env
    networks:
      - traefik-public
    labels:
      - traefik.enable=true
      - traefik.http.routers.learn.rule=Host(`learn.almari`)
      - traefik.http.routers.learn.entrypoints=websecure
      - traefik.http.routers.learn.tls=true
      - traefik.http.services.learn.loadbalancer.server.port=3000
      - traefik.http.services.learn.loadbalancer.responseforwarding.flushinterval=-1

networks:
  traefik-public:
    external: true
